<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
    <nav class="nav-dark">

        <div class="header_left">
            <p class="nav-heading accent-title">Sorting Visualizer</p>

            <div class="algos algos-centered">
                <button class="algo-btn">Bubble</button>
                <button class="algo-btn">Selection</button>
                <button class="algo-btn">Insertion</button>
                <button class="algo-btn">Merge</button>
                <button class="algo-btn">Quick</button>
                <button class="algo-btn">Heap</button>
            </div>
        </div>

        <div class="array-inputs array-panel">
            <p>Size of the array</p>
            <input id="a_size" type="range" min="20" max="150" value="80">

            <p>Speed of the algorithm</p>
            <input id="a_speed" type="range" min="1" max="5" value="4">

            <button id="a_generate" class="generate-btn">Generate New Array</button>
        </div>

    </nav>
</header>

<section>

    <div id="Info_Cont1">
        <h3 class="section-title">Time Complexity</h3>

        <div class="Complexity_Containers">
            <div class="Pair_Definitions">
                <p class="Sub_Heading">Worst case:</p>
                <p id="Time_Worst"></p>
            </div>

            <div class="Pair_Definitions">
                <p class="Sub_Heading">Average case:</p>
                <p id="Time_Average"></p>
            </div>

            <div class="Pair_Definitions">
                <p class="Sub_Heading">Best case:</p>
                <p id="Time_Best"></p>
            </div>
        </div>
    </div>

    <div id="array_container"></div>

    <div id="Info_Cont2">
        <h3 class="section-title">Space Complexity</h3>

        <div class="Complexity_Containers">
            <div class="Pair_Definitions">
                <p class="Sub_Heading">Worst case:</p>
                <p id="Space_Worst"></p>
            </div>
        </div>
    </div>

</section>

<script src="./scripts/main.js"></script>
<script src="./scripts/visualizations.js"></script>

<script src="./scripts/bubble_sort.js"></script>
<script src="./scripts/selection_sort.js"></script>
<script src="./scripts/insertion_sort.js"></script>
<script src="./scripts/merge_sort.js"></script>
<script src="./scripts/quick_sort.js"></script>
<script src="./scripts/heap_sort.js"></script>

</body>
</html>
